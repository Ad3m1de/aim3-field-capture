<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BMC Field Data Capture — Log In</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>

<main class="auth-screen">
  <div class="auth-card">

    <div class="brand">
      <div class="brand-mark">BMC</div>
      <p class="brand-sub">Field Data Capture</p>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-login" role="tab" aria-selected="true">Log in</button>
      <button class="tab" id="tab-signup" role="tab" aria-selected="false">Sign up</button>
    </div>

    <!-- LOG IN FORM -->
    <form id="login-form" class="auth-form" novalidate>
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" autocomplete="email" required placeholder="you@example.com">
        <p class="field-error" id="login-email-error"></p>
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="Enter your password">
        <p class="field-error" id="login-password-error"></p>
      </div>

      <p class="form-message" id="login-message" role="alert"></p>

      <button type="submit" class="btn-primary" id="login-submit">
        <span class="btn-label">Log in</span>
        <span class="spinner" hidden></span>
      </button>
    </form>

    <!-- SIGN UP FORM -->
    <form id="signup-form" class="auth-form" novalidate hidden>
      <div class="field">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" name="name" autocomplete="name" required placeholder="Jane Doe">
        <p class="field-error" id="signup-name-error"></p>
      </div>

      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" autocomplete="email" required placeholder="you@example.com">
        <p class="field-error" id="signup-email-error"></p>
      </div>

      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" autocomplete="new-password" required placeholder="At least 8 characters" minlength="8">
        <p class="field-error" id="signup-password-error"></p>
      </div>

      <p class="form-message" id="signup-message" role="alert"></p>

      <button type="submit" class="btn-primary" id="signup-submit">
        <span class="btn-label">Create account</span>
        <span class="spinner" hidden></span>
      </button>

      <p class="form-note">Your account will need admin approval before you can log in.</p>
    </form>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
</body>
</html>
